<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chaos Attractor Stable</title>
<style>
  body { margin: 0; overflow: hidden; background: black; }
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
// Scene
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 60;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// Controls
const controls = new THREE.OrbitControls(camera, renderer.domElement);

// Variables
let x=0.1, y=0, z=0;
let dt = 0.02;
let mode = 0;

// Geometry
const maxPoints = 20000;
let positions = [];
let colors = [];

const geometry = new THREE.BufferGeometry();

const material = new THREE.PointsMaterial({
  size: 0.15,
  transparent: true,
  opacity: 0.9,
  blending: THREE.AdditiveBlending,
  vertexColors: true
});

const points = new THREE.Points(geometry, material);
scene.add(points);

// Systems
function updateSystem() {
  let dx, dy, dz;

  if (mode === 0) {
    const a=0.2,b=0.2,c=5.7;
    dx=-y-z; dy=x+a*y; dz=b+z*(x-c);

  } else if (mode === 1) {
    const s=10,r=28,beta=8/3;
    dx=s*(y-x);
    dy=x*(r-z)-y;
    dz=x*y-beta*z;

  } else {
    dx=Math.sin(y*2)-z;
    dy=Math.cos(x*2)+y*0.5;
    dz=Math.sin(x*y)-z*0.3;
  }

  x+=dx*dt;
  y+=dy*dt;
  z+=dz*dt;
}

// Animation
function animate() {
  requestAnimationFrame(animate);

  for (let i=0;i<4;i++) {
    updateSystem();

    positions.push(x*5, y*5, z*5);

    let t = positions.length/(maxPoints*3);

    let r = 0.5 + 0.5*Math.sin(t*10);
    let g = 0.3 + 0.7*Math.cos(t*5);
    let b = 1.0;

    colors.push(r,g,b);

    if (positions.length > maxPoints*3) {
      positions.splice(0,3);
      colors.splice(0,3);
    }
  }

  geometry.setAttribute("position", new THREE.Float32BufferAttribute(positions,3));
  geometry.setAttribute("color", new THREE.Float32BufferAttribute(colors,3));

  scene.rotation.y += 0.002;
  scene.rotation.x += 0.001;

  controls.update();
  renderer.render(scene, camera);
}

animate();

// Controls
window.addEventListener("keydown", e => {
  if (e.key==="1") mode=0;
  if (e.key==="2") mode=1;
  if (e.key==="3") mode=2;

  if (e.key==="ArrowUp") dt += 0.002;
  if (e.key==="ArrowDown") dt -= 0.002;

  positions=[]; colors=[];
  x=0.1; y=0; z=0;
});

// Resize
window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
