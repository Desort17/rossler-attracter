<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chaos Attractor INSANE</title>
<style>
  body { margin: 0; overflow: hidden; background: black; }
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<!-- Controls -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<!-- Post Processing -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
// Scene
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 70;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// 🎮 Controls (mouse rotate + zoom)
const controls = new THREE.OrbitControls(camera, renderer.domElement);

// 💡 Bloom
const composer = new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene, camera));

const bloomPass = new THREE.UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight),
  2.0,
  0.5,
  0.05
);
composer.addPass(bloomPass);

// 🌌 STARFIELD
const starsGeometry = new THREE.BufferGeometry();
const stars = [];
for (let i = 0; i < 3000; i++) {
  stars.push((Math.random()-0.5)*1000);
  stars.push((Math.random()-0.5)*1000);
  stars.push((Math.random()-0.5)*1000);
}
starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(stars,3));

const starsMaterial = new THREE.PointsMaterial({ size: 0.7 });
const starField = new THREE.Points(starsGeometry, starsMaterial);
scene.add(starField);

// Chaos variables
let x=0.1, y=0, z=0;
let dt = 0.015;
let mode = 0;

// Geometry
const maxPoints = 30000;
let positions = [];
let colors = [];

const geometry = new THREE.BufferGeometry();

const material = new THREE.PointsMaterial({
  size: 0.12,
  transparent: true,
  opacity: 0.9,
  blending: THREE.AdditiveBlending,
  vertexColors: true
});

const points = new THREE.Points(geometry, material);
scene.add(points);

// 🎵 AUDIO REACTIVE
let analyser, dataArray;
navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
  const audioCtx = new AudioContext();
  const source = audioCtx.createMediaStreamSource(stream);
  analyser = audioCtx.createAnalyser();
  source.connect(analyser);
  dataArray = new Uint8Array(analyser.frequencyBinCount);
}).catch(()=>{});

// 🧠 SYSTEMS
function updateSystem() {
  let dx, dy, dz;

  if (mode === 0) {
    const a=0.2,b=0.2,c=5.7;
    dx=-y-z; dy=x+a*y; dz=b+z*(x-c);

  } else if (mode === 1) {
    const s=10,r=28,beta=8/3;
    dx=s*(y-x);
    dy=x*(r-z)-y;
    dz=x*y-beta*z;

  } else {
    dx=Math.sin(y*2)-z;
    dy=Math.cos(x*2)+y*0.5;
    dz=Math.sin(x*y)-z*0.3;
  }

  x+=dx*dt;
  y+=dy*dt;
  z+=dz*dt;
}

// Animation
function animate() {
  requestAnimationFrame(animate);

  let audioBoost = 1;

  if (analyser) {
    analyser.getByteFrequencyData(dataArray);
    let avg = dataArray.reduce((a,b)=>a+b,0)/dataArray.length;
    audioBoost = avg / 50;
  }

  for (let i=0;i<5;i++) {
    updateSystem();

    let scale = 4 + audioBoost;

    positions.push(x*scale, y*scale, z*scale);

    let t = positions.length/(maxPoints*3);

    let r = 0.5 + 0.5*Math.sin(t*20 + audioBoost);
    let g = 0.2 + 0.8*Math.cos(t*10);
    let b = 1.0;

    colors.push(r,g,b);

    if (positions.length > maxPoints*3) {
      positions.splice(0,3);
      colors.splice(0,3);
    }
  }

  geometry.setAttribute("position", new THREE.Float32BufferAttribute(positions,3));
  geometry.setAttribute("color", new THREE.Float32BufferAttribute(colors,3));

  scene.rotation.y += 0.002;
  scene.rotation.x += 0.001;

  starField.rotation.y += 0.0005;

  controls.update();
  composer.render();
}

animate();

// 🎮 CONTROLS
window.addEventListener("keydown", e => {
  if (e.key==="1") mode=0;
  if (e.key==="2") mode=1;
  if (e.key==="3") mode=2;

  if (e.key==="ArrowUp") dt += 0.002;
  if (e.key==="ArrowDown") dt -= 0.002;

  positions=[]; colors=[];
  x=0.1; y=0; z=0;
});

// Resize
window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
